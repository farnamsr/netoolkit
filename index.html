<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>IPv4 Subnet Calculator | CIDR, Subnetting, Supernetting & Classes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 20px;
      margin: 0;
    }

    .calculator {
      max-width: 1200px;
      width: 100%;
      background: #161b22;
      border: 1px solid #2dba4e;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      color: #c9d1d9;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.3rem;
      flex-wrap: wrap;
    }

    h1 {
      font-weight: 700;
      font-size: 2rem;
      color: #2dba4e;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .badge {
      background: #0d3320;
      color: #2dba4e;
      border: 1px solid #2dba4e;
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .subtitle {
      color: #8b949e;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      border-left: 3px solid #2dba4e;
      padding-left: 1rem;
    }

    .input-panel {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.8rem;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1 1 200px;
      min-width: 180px;
    }

    .field label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 700;
      color: #2dba4e;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .field label .icon {
      font-size: 1rem;
    }

    input, select {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      color: #c9d1d9;
      outline: none;
      transition: all 0.2s;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }

    input:focus, select:focus {
      border-color: #2dba4e;
      box-shadow: 0 0 0 3px rgba(45, 186, 78, 0.1);
    }

    input::placeholder {
      color: #484f58;
    }

    select option {
      background: #0d1117;
      color: #c9d1d9;
    }

    .cidr-slider {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    input[type="range"] {
      width: 140px;
      padding: 0;
      accent-color: #2dba4e;
      height: 6px;
      border: none;
      background: #30363d;
      border-radius: 3px;
    }

    input[type="range"]::-webkit-slider-thumb {
      background: #2dba4e;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #0d1117;
      box-shadow: 0 0 8px rgba(45, 186, 78, 0.3);
    }

    .cidr-value {
      font-weight: 700;
      font-size: 1.3rem;
      background: #0d1117;
      border: 1px solid #2dba4e;
      padding: 0.3rem 1rem;
      border-radius: 8px;
      min-width: 60px;
      text-align: center;
      color: #2dba4e;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }

    button {
      background: #2dba4e;
      border: 1px solid #2dba4e;
      color: #0d1117;
      font-weight: 700;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      white-space: nowrap;
      height: fit-content;
      text-transform: uppercase;
    }

    button:hover {
      background: #3dd05e;
      border-color: #3dd05e;
      box-shadow: 0 4px 12px rgba(45, 186, 78, 0.3);
    }

    button:active {
      transform: scale(0.97);
    }

    /* Results Layout - Two column main grid */
    .results-layout {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Top row: Main info cards */
    .main-info-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
    }

    /* Middle row: Address details */
    .address-details-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
    }

    /* Bottom row: Summary */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }

    .card {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 1.3rem;
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: #2dba4e;
    }

    .card.primary {
      border-left: 4px solid #2dba4e;
    }

    .card.secondary {
      border-left: 4px solid #8b949e;
    }

    .card.accent {
      border-left: 4px solid #4a9eff;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.7rem;
      border-bottom: 1px solid #21262d;
    }

    .card-header .icon {
      font-size: 1.2rem;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a2332;
      border-radius: 8px;
      color: #2dba4e;
    }

    .card-header h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8b949e;
      font-weight: 600;
      margin: 0;
    }

    .ip-display {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: #e6edf3;
      word-break: break-all;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .binary-display {
      background: #010409;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.8rem;
      color: #7d8590;
      margin-top: 0.6rem;
      word-break: break-all;
      line-height: 1.6;
      letter-spacing: 0.5px;
      border: 1px solid #21262d;
    }

    .class-badge {
      background: #0d3320;
      color: #2dba4e;
      border: 1px solid #2dba4e;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.8rem;
      display: inline-block;
      white-space: nowrap;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
      color: #8b949e;
      font-size: 0.9rem;
      border-bottom: 1px solid #1a1f2b;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-row .label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .info-row strong {
      color: #e6edf3;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.9rem;
    }

    .highlight {
      color: #2dba4e;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .divider {
      border-color: #21262d;
      margin: 0.8rem 0;
      border-style: solid;
    }

    .status-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: #2dba4e;
      background: #0d3320;
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      border: 1px solid #1b4a2a;
      line-height: 1.4;
    }

    .network-bit {
      color: #e6edf3;
      font-weight: 700;
    }

    .host-bit {
      color: #484f58;
    }

    .range-display {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .range-item {
      background: #010409;
      border: 1px solid #21262d;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 1rem;
      color: #e6edf3;
    }

    .arrow {
      color: #2dba4e;
      font-weight: 700;
    }

    .error-message {
      color: #f85149;
      border-color: #f85149;
      padding: 1rem;
      border-radius: 8px;
      background: #1a1115;
    }

    .legend {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #8b949e;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      display: inline-block;
    }

    .legend-dot.network {
      background: #e6edf3;
    }

    .legend-dot.host {
      background: #484f58;
    }

    @media (max-width: 768px) {
      .calculator {
        padding: 1.2rem;
        border-radius: 12px;
      }
      .input-panel {
        padding: 1.2rem;
        gap: 1rem;
      }
      .main-info-row,
      .address-details-row,
      .summary-row {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 1.5rem;
      }
      .ip-display {
        font-size: 1.1rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      .calculator {
        padding: 1rem;
      }
      .field {
        min-width: 100%;
      }
      .cidr-slider {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="header">
      <h1>🌐 IPv4 Subnet Calculator</h1>
      <span class="badge">CIDR · Subnet · Supernet</span>
    </div>
    <div class="subtitle">Calculate network details, IP classes, and analyze network/host parts</div>

    <div class="input-panel">
      <div class="field">
        <label><span class="icon">📌</span> IP Address</label>
        <input type="text" id="ipInput" value="192.168.1.100" placeholder="e.g. 10.0.0.1" autocomplete="off">
      </div>
      <div class="field">
        <label><span class="icon">🎚️</span> Prefix Length (CIDR)</label>
        <div class="cidr-slider">
          <input type="range" id="cidrSlider" min="0" max="32" value="24" step="1" title="CIDR prefix 0-32">
          <span class="cidr-value" id="cidrDisplay">/24</span>
        </div>
      </div>
      <div class="field" style="flex: 0 0 auto;">
        <label><span class="icon">⚡</span> Quick Supernet</label>
        <select id="supernetSelect">
          <option value="">— Select —</option>
          <option value="22">/22 (4× Class C)</option>
          <option value="20">/20 (16× Class C)</option>
          <option value="16">/16 (256× Class C)</option>
          <option value="8">/8 (Class A)</option>
        </select>
      </div>
      <button id="calculateBtn">Calculate</button>
    </div>

    <div class="results-layout" id="resultsContainer">
      <!-- dynamically filled by JavaScript -->
    </div>
  </div>

  <script>
    (function() {
      const ipInput = document.getElementById('ipInput');
      const cidrSlider = document.getElementById('cidrSlider');
      const cidrDisplay = document.getElementById('cidrDisplay');
      const supernetSelect = document.getElementById('supernetSelect');
      const calculateBtn = document.getElementById('calculateBtn');
      const resultsContainer = document.getElementById('resultsContainer');

      function ipToOctets(ipStr) {
        const trimmed = ipStr.trim();
        if (!/^(\d{1,3}\.){3}\d{1,3}$/.test(trimmed)) return null;
        const parts = trimmed.split('.').map(Number);
        if (parts.some(p => isNaN(p) || p < 0 || p > 255)) return null;
        return parts;
      }

      function octetsToInt(octets) {
        return ((octets[0] << 24) >>> 0) + (octets[1] << 16) + (octets[2] << 8) + octets[3];
      }

      function intToOctets(intVal) {
        return [
          (intVal >>> 24) & 255,
          (intVal >>> 16) & 255,
          (intVal >>> 8) & 255,
          intVal & 255
        ];
      }

      function ipToString(octets) {
        return octets.join('.');
      }

      function getMaskFromCidr(cidr) {
        if (cidr < 0 || cidr > 32) return null;
        if (cidr === 0) return [0, 0, 0, 0];
        const maskInt = (~((1 << (32 - cidr)) - 1)) >>> 0;
        return intToOctets(maskInt);
      }

      function getWildcard(maskOctets) {
        return maskOctets.map(o => 255 - o);
      }

      function getNetworkAddress(ipOctets, cidr) {
        const maskInt = octetsToInt(getMaskFromCidr(cidr));
        const ipInt = octetsToInt(ipOctets);
        return intToOctets((ipInt & maskInt) >>> 0);
      }

      function getBroadcastAddress(netOctets, cidr) {
        const maskInt = octetsToInt(getMaskFromCidr(cidr));
        const netInt = octetsToInt(netOctets);
        const wildcardInt = (~maskInt) >>> 0;
        return intToOctets((netInt | wildcardInt) >>> 0);
      }

      function getHostRange(netOctets, broadcastOctets) {
        const first = [...netOctets];
        first[3] += 1;
        for (let i = 3; i >= 0; i--) {
          if (first[i] > 255) {
            first[i] = 0;
            if (i > 0) first[i-1]++;
          }
        }
        const last = [...broadcastOctets];
        last[3] -= 1;
        for (let i = 3; i >= 0; i--) {
          if (last[i] < 0) {
            last[i] = 255;
            if (i > 0) last[i-1]--;
          }
        }
        return { first, last };
      }

      function getIPClass(octets) {
        const first = octets[0];
        if (first >= 1 && first <= 126) return 'A';
        if (first === 127) return 'Loopback';
        if (first >= 128 && first <= 191) return 'B';
        if (first >= 192 && first <= 223) return 'C';
        if (first >= 224 && first <= 239) return 'D (Multicast)';
        if (first >= 240 && first <= 255) return 'E (Reserved)';
        return 'Unknown';
      }

      function getDefaultCidrByClass(octets) {
        const cls = getIPClass(octets);
        if (cls === 'A') return 8;
        if (cls === 'B') return 16;
        if (cls === 'C') return 24;
        return null;
      }

      function formatBinaryOctets(octets, cidr) {
        return octets.map((o, idx) => {
          let bin = o.toString(2).padStart(8, '0');
          const bitStart = idx * 8;
          let styled = '';
          for (let i = 0; i < 8; i++) {
            const globalBit = bitStart + i;
            if (globalBit < cidr) {
              styled += `<span class="network-bit">${bin[i]}</span>`;
            } else {
              styled += `<span class="host-bit">${bin[i]}</span>`;
            }
          }
          return styled;
        }).join('.');
      }

      function getSupernetDescription(ipOctets, cidr) {
        const classDefault = getDefaultCidrByClass(ipOctets);
        if (classDefault !== null && cidr < classDefault) {
          return `Supernet (aggregated)`;
        } else if (classDefault !== null && cidr > classDefault) {
          return `Subnet (divided)`;
        } else if (classDefault !== null && cidr === classDefault) {
          return `Classful network`;
        }
        return `CIDR allocation`;
      }

      function renderResults(ipOctets, cidr) {
        if (!ipOctets || cidr === undefined || cidr === null || cidr < 0 || cidr > 32) {
          resultsContainer.innerHTML = `
            <div class="card error-message" style="grid-column:1/-1;">
              ⚠️ Invalid IP address or CIDR prefix. Please use format: 0.0.0.0–255.255.255.255 and CIDR 0–32.
            </div>`;
          return;
        }

        const maskOctets = getMaskFromCidr(cidr);
        const wildOctets = getWildcard(maskOctets);
        const netOctets = getNetworkAddress(ipOctets, cidr);
        const broadcastOctets = getBroadcastAddress(netOctets, cidr);
        const range = getHostRange(netOctets, broadcastOctets);
        const totalAddresses = Math.pow(2, 32 - cidr);
        const usableHosts = (cidr >= 31) ? (cidr === 32 ? 0 : 0) : (totalAddresses - 2);
        const ipClass = getIPClass(ipOctets);
        const defaultCidr = getDefaultCidrByClass(ipOctets);
        const supernetDesc = getSupernetDescription(ipOctets, cidr);
        const networkBits = cidr;
        const hostBits = 32 - cidr;

        const ipBin = formatBinaryOctets(ipOctets, cidr);
        const maskBin = formatBinaryOctets(maskOctets, cidr);
        const netBin = formatBinaryOctets(netOctets, cidr);
        const broadcastBin = formatBinaryOctets(broadcastOctets, cidr);

        const html = `
          <!-- Top Row: Main IP Information -->
          <div class="main-info-row">
            <div class="card primary">
              <div class="card-header">
                <span class="icon">📌</span>
                <h3>IP Address Details</h3>
              </div>
              <div class="ip-display">
                ${ipToString(ipOctets)}
                <span class="class-badge">Class ${ipClass}</span>
              </div>
              <div class="binary-display">${ipBin}</div>
              <div style="margin-top: 0.8rem;">
                <span class="highlight">/${cidr} prefix</span>
                <span style="color: #8b949e; margin-left: 0.5rem;">· ${supernetDesc}</span>
              </div>
              <div class="legend">
                <div class="legend-item">
                  <span class="legend-dot network"></span> Network bits
                </div>
                <div class="legend-item">
                  <span class="legend-dot host"></span> Host bits
                </div>
              </div>
            </div>

            <div class="card secondary">
              <div class="card-header">
                <span class="icon">🧩</span>
                <h3>Network Structure</h3>
              </div>
              <div class="info-row">
                <span class="label">🔹 Network bits</span>
                <strong>${networkBits} bits</strong>
              </div>
              <div class="info-row">
                <span class="label">🔸 Host bits</span>
                <strong>${hostBits} bits</strong>
              </div>
              <div class="info-row">
                <span class="label">📋 Default class mask</span>
                <strong>${defaultCidr ? '/' + defaultCidr : 'N/A'}</strong>
              </div>
              <div class="info-row">
                <span class="label">🏷️ IP Class</span>
                <strong>${ipClass}</strong>
              </div>
              <div style="margin-top: 0.8rem;">
                <span class="status-tag">
                  📐 ${supernetDesc} ${defaultCidr ? '(default /' + defaultCidr + ')' : ''}
                </span>
              </div>
            </div>
          </div>

          <!-- Middle Row: Network Addresses -->
          <div class="address-details-row">
            <div class="card accent">
              <div class="card-header">
                <span class="icon">🌐</span>
                <h3>Network Address</h3>
              </div>
              <div class="ip-display" style="font-size: 1.2rem;">${ipToString(netOctets)}</div>
              <div class="binary-display">${netBin}</div>
            </div>

            <div class="card accent">
              <div class="card-header">
                <span class="icon">📢</span>
                <h3>Broadcast Address</h3>
              </div>
              <div class="ip-display" style="font-size: 1.2rem;">${ipToString(broadcastOctets)}</div>
              <div class="binary-display">${broadcastBin}</div>
            </div>

            <div class="card">
              <div class="card-header">
                <span class="icon">🛡️</span>
                <h3>Subnet Mask</h3>
              </div>
              <div class="ip-display" style="font-size: 1.2rem;">${ipToString(maskOctets)}</div>
              <div class="binary-display">${maskBin}</div>
              <div style="color:#8b949e; margin-top:0.5rem; font-size:0.85rem;">
                Wildcard: ${ipToString(wildOctets)}
              </div>
            </div>
          </div>

          <!-- Bottom Row: Host Range & Summary -->
          <div class="summary-row">
            <div class="card primary">
              <div class="card-header">
                <span class="icon">🖥️</span>
                <h3>Usable Host Range</h3>
              </div>
              <div class="range-display">
                <span class="range-item">${ipToString(range.first)}</span>
                <span class="arrow">→</span>
                <span class="range-item">${ipToString(range.last)}</span>
              </div>
              <div style="margin-top: 0.8rem; color: #8b949e; font-size: 0.9rem;">
                Usable hosts: <strong style="color:#2dba4e; font-size:1.1rem;">${usableHosts.toLocaleString()}</strong>
              </div>
            </div>

            <div class="card secondary">
              <div class="card-header">
                <span class="icon">📊</span>
                <h3>Address Summary</h3>
              </div>
              <div class="info-row">
                <span class="label">📦 Total addresses</span>
                <strong>${totalAddresses.toLocaleString()}</strong>
              </div>
              <div class="info-row">
                <span class="label">✅ Usable hosts</span>
                <strong>${usableHosts.toLocaleString()}</strong>
              </div>
              <div class="info-row">
                <span class="label">📐 CIDR notation</span>
                <strong>/${cidr}</strong>
              </div>
              <div class="info-row">
                <span class="label">🏷️ Address class</span>
                <strong>${ipClass}</strong>
              </div>
            </div>
          </div>
        `;

        resultsContainer.innerHTML = html;
      }

      function updateCalculation() {
        const octets = ipToOctets(ipInput.value);
        const cidr = parseInt(cidrSlider.value, 10);
        cidrDisplay.textContent = `/${cidr}`;
        
        if (!octets) {
          resultsContainer.innerHTML = `
            <div class="card error-message" style="grid-column:1/-1;">
              ⚠️ Please enter a valid IPv4 address (e.g. 192.168.1.1)
            </div>`;
          return;
        }
        renderResults(octets, cidr);
      }

      // Event listeners
      calculateBtn.addEventListener('click', updateCalculation);

      cidrSlider.addEventListener('input', function(e) {
        cidrDisplay.textContent = `/${e.target.value}`;
      });
      
      cidrSlider.addEventListener('change', updateCalculation);

      ipInput.addEventListener('input', function() {
        const octets = ipToOctets(ipInput.value);
        if (octets) {
          updateCalculation();
        }
      });

      ipInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') updateCalculation();
      });

      supernetSelect.addEventListener('change', function(e) {
        if (e.target.value !== '') {
          cidrSlider.value = parseInt(e.target.value, 10);
          cidrDisplay.textContent = `/${e.target.value}`;
          updateCalculation();
        }
      });

      // Initial render
      updateCalculation();
    })();
  </script>
</body>
</html>
